<!-- client/account.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Account - Fresho</title>
  <link rel="stylesheet" href="account.css" />
  <script src="nav.js" defer></script>
</head>
<body>
  <!-- Top Bar -->
  <header class="top-bar">
    <div class="logo">Fresho</div>
    <div class="search-container">
      <input type="text" placeholder="Search Products..." />
      <span class="search-icon">🔍</span>
    </div>
    <div class="user-actions">
      <span id="userEmail"></span>
      <a id="accountLink" href="account.html">Account <br /><strong>Login</strong></a>
      <a href="wishlist.html">Wishlist<br /><strong>My Items</strong></a>
      <a href="cart.html">Cart<br /><strong>Items</strong></a>
      <a href="payment.html">payment</a>
      <button id="logoutBtn" style="display: none;">Logout</button>
    </div>
  </header>

  <!-- Navigation Menu -->
  <nav class="nav-menu">
    <a href="index.html">Home</a>
    <a href="products.html">Products</a>
    <a href="contact.html">Contact Us</a>
    <a href="about.html">About Us</a>
  </nav>

  <main>
    <h1>Fresho - Account</h1>

    <!-- Login Form -->
    <form id="loginForm">
      <h2>Login</h2>
      <input type="email" id="loginEmail" name="email" placeholder="Email" required />
      <input type="password" id="loginPassword" name="password" placeholder="Password" required />
      <button type="submit">Login</button>
    </form>

    <!-- Create Account Form -->
    <form id="createForm">
      <h2>Create Account</h2>
      <input type="email" id="createEmail" name="email" placeholder="Email" required />
      <input type="password" id="createPassword" name="password" placeholder="Password" required />
      <button type="submit">Create</button>
    </form>

    <p id="message"></p>
  </main>

  <script src="account.js"></script>
</body>
</html>
